              - paragraph [ref=e346]: We discovered places that moved us to tears, shared emotional moments at sunset, and met the Guna people, resilient and deeply connected spiritually with nature. We fully immersed ourselves in this adventure, felt part of the Ikigai Sailing “family,” and at the same time so small in front of the vastness of the San Blas Islands’ nature.
              - paragraph [ref=e347]: I don’t think we will ever truly be able to put it into words. This is only a goodbye for now, we will meet again in the new world. Ikigai has captured our hearts!
          - paragraph [ref=e350]: Elisa
