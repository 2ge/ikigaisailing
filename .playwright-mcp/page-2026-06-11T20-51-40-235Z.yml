      - generic [ref=e237]:
        - generic [ref=e238]:
          - paragraph [ref=e239]: Logbook
          - heading "Voices from aboard." [level=2] [ref=e241]
        - link "Read all reviews →" [ref=e242] [cursor=pointer]:
          - /url: /reviews/
      - generic [ref=e244]:
        - figure "Alice Modolo Paris" [ref=e245]:
          - img [ref=e246]
          - blockquote [ref=e248]:
            - generic [ref=e249]:
              - paragraph [ref=e250]: We truly felt lucky when, not long ago, a dear friend of ours met Luca on a beach in Los Roques. From that moment, we discovered the Ikigai Sailing project. Even before taking part in this incredible experience, we were watching this crew of dreamer sailors from afar. Shortly after, we found ourselves on board the catamaran with them. Lucky indeed!
              - paragraph [ref=e251]: "My partner and I enjoyed every single moment of this unforgettable journey. We discovered the beauty of being able to trust someone. Luca guided us with professionalism, safety, and calmness toward new activities: meditation, yoga, freediving, and spearfishing. We pushed beyond our physical and mental limits, learned to slow down, and to look within. We felt renewed and stronger."
              - paragraph [ref=e252]: Surrounded by the unique atmosphere of the Caribbean Sea, the Ikigai crew is a perfect blend. We cannot fail to mention Paula’s sweetness and Luca’s passion for cooking. Together, they pampered us every day with delicacies from the sea. We felt at home.
              - paragraph [ref=e253]: We discovered places that moved us to tears, shared emotional moments at sunset, and met the Guna people, resilient and deeply connected spiritually with nature. We fully immersed ourselves in this adventure, felt part of the Ikigai Sailing “family,” and at the same time so small in front of the vastness of the San Blas Islands’ nature.
              - paragraph [ref=e254]: I don’t think we will ever truly be able to put it into words. This is only a goodbye for now, we will meet again in the new world. Ikigai has captured our hearts!
          - generic [ref=e256]:
            - paragraph [ref=e257]: Alice Modolo
            - paragraph [ref=e258]: Paris
