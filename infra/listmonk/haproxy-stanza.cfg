# Add to /etc/haproxy/haproxy.cfg to expose Listmonk as news.ikigaisailing.com
# (or news.2pu.net for intranet-only). Follows the existing *.2pu.net pattern.
#
# In `frontend http_in`, with the other ACLs:
#     acl is_listmonk  hdr(host) -i news.ikigaisailing.com
#     acl is_listmonk  hdr(host) -i news.2pu.net
#     # public subscription/confirm pages are fine; gate the admin UI if on 2pu.net
#     use_backend listmonk_app if is_listmonk
#
# As a new backend:
backend listmonk_app
    timeout server 120s
    server local 127.0.0.1:9000 check
#
# PORTS.md: 9000 = ikigai / listmonk (mailing). Add the row in the same change.
# DNS: point news.ikigaisailing.com at this host (Cloudflare, proxied).
